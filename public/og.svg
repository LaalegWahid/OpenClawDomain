<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1E1E1E" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1E1E1E" stroke-width="1"/>

  <!-- Radial glow behind mark -->
  <radialGradient id="glow" cx="50%" cy="50%" r="25%">
    <stop offset="0%" stop-color="#FF4D00" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#FF4D00" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mark — centered, 120×120 -->
  <rect x="540" y="215" width="120" height="120" rx="28" fill="#FF4D00"/>
  <line x1="572" y1="314" x2="589" y2="230" stroke="white" stroke-width="9.5" stroke-linecap="square"/>
  <line x1="593" y1="314" x2="610" y2="226" stroke="white" stroke-width="9.5" stroke-linecap="square"/>
  <line x1="614" y1="314" x2="631" y2="230" stroke="white" stroke-width="9.5" stroke-linecap="square"/>

  <!-- Wordmark -->
  <text x="600" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="500" letter-spacing="-1.5" text-anchor="middle">
    <tspan fill="#F0EEE8">Open</tspan><tspan fill="#FF4D00">Claw</tspan><tspan fill="#555555"> Manager</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" letter-spacing="0.5" text-anchor="middle" fill="#555555">Deploy AI Agents. Run your business on autopilot.</text>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" stroke="#1E1E1E" stroke-width="2" fill="none"/>
</svg>
